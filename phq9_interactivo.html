<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHQ-9 — Cuestionario de Salud del Paciente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eff0f5;
    --surface: #e4e5ee;
    --card: #ffffff;
    --border: #d0d2e0;
    --border-soft: #dcdee8;
    --accent: #6070a8;       /* índigo azulado — único PHQ-9 */
    --accent2: #b07868;      /* terracota suave */
    --text: #282c3a;
    --text-muted: #606478;
    --text-dim: #a8acbc;
    --selected-bg: #eceef8;
    --selected-border: #6070a8;
    --shadow: 0 2px 16px rgba(40,44,80,0.07);
    --shadow-sm: 0 1px 6px rgba(40,44,80,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 45% at 7% 10%,  rgba(96,112,168,0.09) 0%, transparent 55%),
      radial-gradient(ellipse 50% 55% at 90% 85%, rgba(176,120,104,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 35% 40% at 72% 5%,  rgba(96,112,168,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .header {
    margin-bottom: 44px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .header-label { color: var(--accent); font-size: 10px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 14px; }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
  }

  .header h1 em { font-style: italic; color: var(--accent2); }
  .header-desc { margin-top: 12px; color: var(--text-muted); font-size: 12px; max-width: 540px; line-height: 1.65; }

  .instruccion {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }

  .instruccion-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .instruccion p { color: var(--text-muted); font-size: 12.5px; line-height: 1.7; }

  /* Leyenda */
  .scale-legend {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .scale-leg-item { background: var(--card); border: 1px solid var(--border-soft); border-radius: 10px; padding: 12px 10px; box-shadow: var(--shadow-sm); text-align: center; }
  .scale-leg-num  { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .scale-leg-txt  { font-size: 10.5px; color: var(--text-muted); line-height: 1.35; }

  /* Progreso */
  .progress-wrap { margin-bottom: 24px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-label { color: var(--text-dim); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .progress-count { color: var(--accent); font-size: 11px; font-weight: 500; }
  .progress-bar   { height: 3px; background: var(--border-soft); border-radius: 3px; overflow: hidden; }
  .progress-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* Preguntas */
  .questions-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 8px 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-row {
    padding: 18px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .question-row:last-child { border-bottom: none; }

  .question-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }

  .question-num {
    min-width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-size: 11px; font-weight: 500;
    flex-shrink: 0; margin-top: 2px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
    transition: all 0.15s;
  }

  .question-row.answered .question-num { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Ítem 9 especial */
  .question-row.q9 .question-num { border-color: var(--accent2); }
  .question-row.q9.answered .question-num { background: var(--accent2); border-color: var(--accent2); }

  .question-text { font-size: 13px; color: var(--text-muted); line-height: 1.55; padding-top: 2px; transition: color 0.15s; }
  .question-row.answered .question-text { color: var(--text); }

  .options-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    padding-left: 40px;
  }

  .opt-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 10px 6px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    background: #f8f9fc;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Jost', sans-serif;
  }

  .opt-btn:hover { border-color: var(--accent); background: var(--selected-bg); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(96,112,168,0.12); }
  .opt-btn.active { border-color: var(--accent); background: var(--selected-bg); box-shadow: 0 3px 12px rgba(96,112,168,0.18); }

  /* Ítem 9 opciones con color diferente */
  .opt-btn.q9-opt:hover  { border-color: var(--accent2); background: rgba(176,120,104,0.06); }
  .opt-btn.q9-opt.active { border-color: var(--accent2); background: rgba(176,120,104,0.08); box-shadow: 0 3px 12px rgba(176,120,104,0.15); }

  .opt-circle {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 400;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted); transition: all 0.15s;
  }

  .opt-btn.active .opt-circle         { background: var(--accent); border-color: var(--accent); color: #fff; }
  .opt-btn.q9-opt.active .opt-circle  { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .opt-label { font-size: 9.5px; color: var(--text-dim); text-align: center; line-height: 1.3; transition: color 0.15s; }
  .opt-btn.active .opt-label       { color: var(--accent); }
  .opt-btn.q9-opt.active .opt-label { color: var(--accent2); }

  /* Impacto funcional */
  .funcional-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent2);
    border-radius: 0 12px 12px 0;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .funcional-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
  .funcional-question { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6; }

  .funcional-opts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .func-btn {
    padding: 10px 8px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    background: #f8f9fc;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.4;
  }

  .func-btn:hover  { border-color: var(--accent2); background: rgba(176,120,104,0.05); }
  .func-btn.active { border-color: var(--accent2); background: rgba(176,120,104,0.08); color: var(--text); font-weight: 500; }

  /* Botón resultado */
  .btn-result {
    display: block; width: 100%; padding: 16px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: var(--accent); border: none; border-radius: 10px;
    color: #fff; cursor: pointer; transition: all 0.18s ease;
    box-shadow: 0 3px 14px rgba(96,112,168,0.28);
  }

  .btn-result:hover { background: #4e5e96; box-shadow: 0 4px 18px rgba(96,112,168,0.38); transform: translateY(-1px); }
  .btn-result:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Resultados */
  .results { animation: fadeSlide 0.4s ease; }

  .score-display {
    text-align: center; padding: 52px 36px;
    background: var(--card); border: 1px solid var(--border-soft);
    border-radius: 16px; margin-bottom: 20px;
    position: relative; overflow: hidden; box-shadow: var(--shadow);
  }

  .score-display::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 55% at 50% 110%, rgba(96,112,168,0.09) 0%, transparent 65%);
    pointer-events: none;
  }

  .score-label { color: var(--text-dim); font-size: 10px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 16px; }

  .score-number { font-family: 'Playfair Display', serif; font-size: 100px; font-weight: 300; line-height: 1; margin-bottom: 8px; }
  .score-max    { color: var(--text-dim); font-size: 12px; margin-bottom: 22px; }

  .score-severity {
    display: inline-block; padding: 9px 28px; border-radius: 24px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; border: 1px solid;
  }

  .sev-none   { color: #5e8f6e; border-color: #a8c9b3; background: #eef5f1; }
  .sev-mild   { color: #7a8f5e; border-color: #b8c9a3; background: #f2f5ec; }
  .sev-mod    { color: #9a7c3f; border-color: #d4b87a; background: #faf5ea; }
  .sev-modsev { color: #a04060; border-color: #d090a8; background: #faeef3; }
  .sev-severe { color: #6050a8; border-color: #b0a0e0; background: #f3f0fa; }

  /* Ítem 9 alerta */
  .q9-alert {
    background: rgba(176,120,104,0.06);
    border: 1px solid rgba(176,120,104,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .q9-alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .q9-alert-text { font-size: 12px; color: var(--text-muted); line-height: 1.65; }
  .q9-alert-text strong { color: var(--accent2); }

  /* Breakdown */
  .breakdown-section { background: var(--card); border: 1px solid var(--border-soft); border-radius: 14px; padding: 24px 26px; margin-bottom: 18px; box-shadow: var(--shadow-sm); }
  .breakdown-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 300; margin-bottom: 18px; color: var(--text-muted); }
  .breakdown-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-soft); }
  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-name { flex: 1; color: var(--text-muted); font-size: 12px; line-height: 1.4; }
  .breakdown-bar-wrap { width: 90px; height: 5px; background: var(--border-soft); border-radius: 3px; overflow: hidden; }
  .breakdown-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .breakdown-val { width: 28px; text-align: right; font-size: 12px; font-weight: 500; color: var(--accent); }

  /* Interpretación */
  .interpretation { background: var(--card); border: 1px solid var(--border-soft); border-radius: 14px; padding: 24px 26px; margin-bottom: 18px; box-shadow: var(--shadow-sm); }
  .interpretation h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 300; margin-bottom: 16px; color: var(--text-muted); }

  .interp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .interp-item { padding: 13px 16px; background: #f8f9fc; border-radius: 8px; border: 1px solid var(--border-soft); }
  .interp-range { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; margin-bottom: 4px; text-transform: uppercase; }
  .interp-desc  { color: var(--text-muted); font-size: 12px; margin-bottom: 4px; }
  .interp-action { color: var(--text-dim); font-size: 10.5px; font-style: italic; line-height: 1.4; }

  .interp-item.current { border-color: var(--accent); background: var(--selected-bg); }
  .interp-item.current .interp-desc { color: var(--text); font-weight: 400; }

  /* Impacto funcional resultado */
  .func-result {
    background: var(--card); border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent2); border-radius: 0 12px 12px 0;
    padding: 16px 20px; margin-bottom: 18px; box-shadow: var(--shadow-sm);
  }

  .func-result-lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent2); margin-bottom: 5px; }
  .func-result-val { font-size: 13px; color: var(--text-muted); }

  /* Botones */
  .btn-copy {
    display: block; width: 100%; margin-top: 18px; padding: 15px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; border: 1px solid var(--accent);
    border-radius: 8px; color: var(--accent); cursor: pointer; transition: all 0.18s ease;
  }
  .btn-copy:hover { background: var(--selected-bg); }

  .btn-restart {
    display: block; width: 100%; margin-top: 10px; padding: 15px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: all 0.18s ease;
  }
  .btn-restart:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface); }

  @media (max-width: 600px) {
    .header h1 { font-size: 30px; }
    .scale-legend { grid-template-columns: repeat(2, 1fr); }
    .options-row { padding-left: 0; gap: 5px; }
    .funcional-opts { grid-template-columns: repeat(2, 1fr); }
    .interp-grid { grid-template-columns: 1fr; }
    .score-number { font-size: 72px; }
    .questions-card { padding: 8px 14px 16px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const questions = [
  "Poco interés o placer en hacer cosas.",
  "Se ha sentido decaído/a, deprimido/a o sin esperanzas.",
  "Ha tenido dificultad para quedarse o permanecer dormido/a, o ha dormido demasiado.",
  "Se ha sentido cansado/a o con poca energía.",
  "Sin apetito o ha comido en exceso.",
  "Se ha sentido mal con usted mismo/a — o que es un fracaso o que ha quedado mal con usted mismo/a o con su familia.",
  "Ha tenido dificultad para concentrarse en ciertas actividades, tales como leer el periódico o ver la televisión.",
  "¿Se ha movido o hablado tan lento que otras personas podrían haberlo notado? O lo contrario — muy inquieto/a o agitado/a, moviéndose mucho más de lo normal.",
  "Pensamientos de que estaría mejor muerto/a o de lastimarse de alguna manera."
];

const SCALE = [
  { score: 0, label: "Ningún día" },
  { score: 1, label: "Varios días" },
  { score: 2, label: "Más de la mitad de los días" },
  { score: 3, label: "Casi todos los días" }
];

const FUNCIONAL_OPTS = ["No ha sido difícil", "Un poco difícil", "Muy difícil", "Extremadamente difícil"];

const SEVERITY = [
  { min: 0,  max: 4,  label: "Ninguna – Mínima",    cls: "sev-none",   action: "Sin tratamiento indicado." },
  { min: 5,  max: 9,  label: "Leve",                 cls: "sev-mild",   action: "Vigilancia activa; repetir PHQ-9 en seguimiento." },
  { min: 10, max: 14, label: "Moderada",              cls: "sev-mod",    action: "Plan de tratamiento: consejería, seguimiento y/o farmacoterapia." },
  { min: 15, max: 19, label: "Moderadamente severa",  cls: "sev-modsev", action: "Tratamiento activo con farmacoterapia y/o psicoterapia." },
  { min: 20, max: 27, label: "Severa",                cls: "sev-severe", action: "Inicio inmediato de farmacoterapia. Derivación expedita a especialista si respuesta pobre." }
];

function getSeverity(score) {
  return SEVERITY.find(s => score >= s.min && score <= s.max);
}

function getScoreColor(score) {
  if (score <= 4)  return '#5e8f6e';
  if (score <= 9)  return '#7a8f5e';
  if (score <= 14) return '#9a7c3f';
  if (score <= 19) return '#a04060';
  return '#6050a8';
}

let answers     = new Array(questions.length).fill(null);
let funcional   = null;
let showResults = false;

function answered() { return answers.filter(a => a !== null).length; }
function totalScore() { return answers.reduce((s, a) => s + (a || 0), 0); }

function render() {
  const app = document.getElementById('app');
  if (showResults) { renderResults(app); return; }

  const done = answered();
  const pct  = (done / questions.length) * 100;

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Evaluación · Autoinforme</div>
      <h1>Cuestionario de Salud del Paciente <em>PHQ-9</em></h1>
      <p class="header-desc">9 ítems · Durante las <strong>últimas 2 semanas</strong>, ¿qué tan seguido ha tenido molestias debido a los siguientes problemas? Kroenke & Spitzer, 2002.</p>
    </div>

    <div class="instruccion">
      <div class="instruccion-title">Instrucciones</div>
      <p>Seleccione para cada pregunta la opción que mejor describe su experiencia durante las <strong>últimas dos semanas</strong>, incluyendo hoy.</p>
    </div>

    <div class="scale-legend">
      ${SCALE.map(s => `
        <div class="scale-leg-item">
          <div class="scale-leg-num">${s.score}</div>
          <div class="scale-leg-txt">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Completado</span>
        <span class="progress-count">${done} / ${questions.length}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="questions-card">
      ${questions.map((q, i) => {
        const isQ9 = i === 8;
        return `
          <div class="question-row ${answers[i] !== null ? 'answered' : ''} ${isQ9 ? 'q9' : ''}">
            <div class="question-top">
              <span class="question-num">${i + 1}</span>
              <span class="question-text">${q}</span>
            </div>
            <div class="options-row">
              ${SCALE.map(s => `
                <button class="opt-btn ${isQ9 ? 'q9-opt' : ''} ${answers[i] === s.score ? 'active' : ''}"
                        onclick="select(${i}, ${s.score})">
                  <span class="opt-circle">${s.score}</span>
                  <span class="opt-label">${s.label}</span>
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="funcional-card">
      <div class="funcional-title">Impacto funcional</div>
      <div class="funcional-question">Si marcó cualquiera de los problemas, ¿qué tanta dificultad le han dado estos problemas para hacer su trabajo, encargarse de las tareas del hogar, o llevarse bien con otras personas?</div>
      <div class="funcional-opts">
        ${FUNCIONAL_OPTS.map((opt, i) => `
          <button class="func-btn ${funcional === i ? 'active' : ''}" onclick="setFuncional(${i})">${opt}</button>
        `).join('')}
      </div>
    </div>

    <button class="btn-result" onclick="verResultado()" ${done < questions.length ? 'disabled' : ''}>
      ${done < questions.length ? `Faltan ${questions.length - done} preguntas` : 'Ver resultado →'}
    </button>
  `;
}

function renderResults(app) {
  const total  = totalScore();
  const sev    = getSeverity(total);
  const color  = getScoreColor(total);
  const q9val  = answers[8] || 0;

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Resultado de la evaluación</div>
      <h1>Cuestionario de Salud del Paciente <em>PHQ-9</em></h1>
    </div>

    <div class="results">

      <div class="score-display">
        <div class="score-label">Puntuación total</div>
        <div class="score-number" style="color:${color}">${total}</div>
        <div class="score-max">de 27 puntos posibles</div>
        <span class="score-severity ${sev.cls}">${sev.label}</span>
      </div>

      ${q9val > 0 ? `
        <div class="q9-alert">
          <div class="q9-alert-icon">⚠</div>
          <div class="q9-alert-text">
            <strong>Ítem 9 — Pensamientos de autolesión:</strong> el paciente reportó puntaje ${q9val}/3 en este ítem
            (${SCALE[q9val].label.toLowerCase()}). Se recomienda <strong>evaluación directa del riesgo suicida</strong>
            independientemente del puntaje total.
          </div>
        </div>
      ` : ''}

      ${funcional !== null ? `
        <div class="func-result">
          <div class="func-result-lbl">Impacto funcional reportado</div>
          <div class="func-result-val">${FUNCIONAL_OPTS[funcional]}</div>
        </div>
      ` : ''}

      <div class="breakdown-section">
        <div class="breakdown-title">Desglose por ítem</div>
        ${questions.map((q, i) => {
          const v = answers[i] || 0;
          return `
            <div class="breakdown-item">
              <div class="breakdown-name">${i+1}. ${q}</div>
              <div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:${(v/3)*100}%"></div></div>
              <div class="breakdown-val" style="${i === 8 && v > 0 ? 'color:var(--accent2)' : ''}">${v}/3</div>
            </div>`;
        }).join('')}
      </div>

      <div class="interpretation">
        <h3>Interpretación y acciones sugeridas</h3>
        <div class="interp-grid">
          ${SEVERITY.map(s => `
            <div class="interp-item ${total >= s.min && total <= s.max ? 'current' : ''}">
              <div class="interp-range">${s.min}–${s.max} pts</div>
              <div class="interp-desc">${s.label}</div>
              <div class="interp-action">${s.action}</div>
            </div>
          `).join('')}
        </div>
        <p style="margin-top:16px; color:var(--text-dim); font-size:11px; line-height:1.7;">
          Nota: El PHQ-9 es una herramienta de cribado validada para depresión mayor. El diagnóstico clínico requiere evaluación completa. Ref: Kroenke K, Spitzer RL. Psychiatr Ann. 2002;32:509-521.
        </p>
      </div>

      <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">⎘ Copiar para ficha clínica</button>
      <button class="btn-restart" onclick="restart()">↩ Nueva evaluación</button>
    </div>
  `;
}

function buildPlainText() {
  const total = totalScore();
  const sev   = getSeverity(total);
  const q9val = answers[8] || 0;
  const date  = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const labs  = ['Ningun dia (0)', 'Varios dias (1)', 'Mas de la mitad de los dias (2)', 'Casi todos los dias (3)'];

  const lines = [];
  lines.push('PHQ-9 — CUESTIONARIO DE SALUD DEL PACIENTE');
  lines.push('Fecha de aplicacion: ' + date);
  lines.push('Periodo de referencia: ultimas 2 semanas');
  lines.push('');
  lines.push('ITEMS Y PUNTAJES:');
  questions.forEach((q, i) => {
    const v = answers[i] || 0;
    lines.push((i+1) + '. ' + q);
    lines.push('   ' + labs[v] + (i === 8 && v > 0 ? '  [** ITEM SUICIDIO — EVALUAR **]' : ''));
  });
  lines.push('');
  if (funcional !== null) {
    lines.push('IMPACTO FUNCIONAL: ' + FUNCIONAL_OPTS[funcional]);
    lines.push('');
  }
  lines.push('PUNTAJE TOTAL: ' + total + ' / 27');
  lines.push('SEVERIDAD: ' + sev.label + ' (' + sev.min + '-' + sev.max + ' puntos)');
  lines.push('ACCION SUGERIDA: ' + sev.action);
  if (q9val > 0) {
    lines.push('');
    lines.push('** ATENCION: Item 9 (pensamientos autolesion) = ' + q9val + '/3 — Evaluar riesgo suicida **');
  }
  lines.push('');
  lines.push('Rangos de referencia:');
  lines.push('  0-4:   Sin depresion / Minima');
  lines.push('  5-9:   Leve');
  lines.push('  10-14: Moderada');
  lines.push('  15-19: Moderadamente severa');
  lines.push('  20-27: Severa');
  lines.push('');
  lines.push('Fuente: Kroenke K, Spitzer RL. Psychiatr Ann. 2002;32:509-521.');
  return lines.join('\n');
}

async function copyToClipboard() {
  const text = buildPlainText();
  const btn  = document.getElementById('btnCopy');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copiado';
    btn.style.borderColor = '#7a8f5e';
    btn.style.color = '#7a8f5e';
    setTimeout(() => { btn.textContent = '⎘ Copiar para ficha clínica'; btn.style.borderColor = ''; btn.style.color = ''; }, 2500);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = '⎘ Copiar para ficha clínica'; }, 2500);
  }
}

function select(i, v)      { answers[i] = v; render(); }
function setFuncional(i)   { funcional = i; render(); }
function verResultado()    { if (answered() < questions.length) return; showResults = true; render(); }
function restart()         { answers = new Array(questions.length).fill(null); funcional = null; showResults = false; render(); }

render();
</script>
</body>
</html>
