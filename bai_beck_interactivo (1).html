<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAI — Inventario de Ansiedad de Beck</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f2ee;
    --surface: #eae7e0;
    --card: #ffffff;
    --border: #ddd8cf;
    --border-soft: #e8e4dc;
    --accent: #8fa8b8;       /* azul niebla como primario */
    --accent2: #b07d6a;      /* terracota cálida */
    --accent3: #7a9e87;      /* salvia verde */
    --text: #3a3530;
    --text-muted: #7a7168;
    --text-dim: #b0a89e;
    --selected-bg: #eef2f5;
    --selected-border: #8fa8b8;
    --shadow: 0 2px 16px rgba(80,60,40,0.07);
    --shadow-sm: 0 1px 6px rgba(80,60,40,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 45% at 10% 15%, rgba(143,168,184,0.09) 0%, transparent 55%),
      radial-gradient(ellipse 50% 55% at 90% 80%, rgba(176,125,106,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 35% 40% at 75% 10%, rgba(122,158,135,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  .header {
    margin-bottom: 44px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    color: var(--accent);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent2);
  }

  .header-desc {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 12px;
    max-width: 560px;
    line-height: 1.65;
  }

  /* ── Instrucción ── */
  .instruccion {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 32px;
    box-shadow: var(--shadow-sm);
  }

  .instruccion-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .instruccion p {
    color: var(--text-muted);
    font-size: 12.5px;
    line-height: 1.7;
  }

  /* ── Escala de respuesta ── */
  .scale-legend {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .scale-leg-item {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: var(--shadow-sm);
    text-align: center;
  }

  .scale-leg-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }

  .scale-leg-txt {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* ── Lista de síntomas ── */
  .symptoms-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 32px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .symptom-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border-soft);
    transition: background 0.15s ease;
  }

  .symptom-row:last-child { border-bottom: none; }

  .symptom-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .symptom-num {
    min-width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .symptom-name {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
    transition: color 0.15s;
  }

  .symptom-row.answered .symptom-name {
    color: var(--text);
  }

  /* Botones de puntuación inline */
  .score-btns {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .score-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .score-btn:hover {
    border-color: var(--accent);
    background: var(--selected-bg);
    color: var(--accent);
  }

  .score-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(143,168,184,0.3);
  }

  /* ── Progreso ── */
  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .progress-count { color: var(--accent); font-size: 11px; font-weight: 500; }

  .progress-bar {
    height: 3px;
    background: var(--border-soft);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Botón resultado ── */
  .btn-result {
    display: block;
    width: 100%;
    padding: 16px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 3px 14px rgba(143,168,184,0.3);
    margin-top: 8px;
  }

  .btn-result:hover {
    background: #7a96a8;
    box-shadow: 0 4px 18px rgba(143,168,184,0.4);
    transform: translateY(-1px);
  }

  .btn-result:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── Resultados ── */
  .results { animation: fadeSlide 0.4s ease; }

  .score-display {
    text-align: center;
    padding: 52px 36px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .score-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 110%, rgba(143,168,184,0.09) 0%, transparent 65%);
    pointer-events: none;
  }

  .score-label {
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-max { color: var(--text-dim); font-size: 12px; margin-bottom: 22px; }

  .score-severity {
    display: inline-block;
    padding: 9px 28px;
    border-radius: 24px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid;
  }

  .severity-min      { color: #5e8f6e; border-color: #a8c9b3; background: #eef5f1; }
  .severity-leve     { color: #7a8f5e; border-color: #b8c9a3; background: #f1f5ec; }
  .severity-moderate { color: #9a7c3f; border-color: #d4b87a; background: #faf5ea; }
  .severity-severe   { color: #a04545; border-color: #cc9090; background: #faeaea; }

  /* Breakdown */
  .breakdown-section {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 28px 30px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .breakdown-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 300;
    margin-bottom: 20px;
    color: var(--text-muted);
  }

  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .breakdown-item:last-child { border-bottom: none; }

  .breakdown-name { flex: 1; color: var(--text-muted); font-size: 12px; }

  .breakdown-bar-wrap {
    width: 100px;
    height: 5px;
    background: var(--border-soft);
    border-radius: 3px;
    overflow: hidden;
  }

  .breakdown-bar {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .breakdown-val {
    width: 28px;
    text-align: right;
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
  }

  /* Interpretation */
  .interpretation {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 26px 30px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .interpretation h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 16px;
    color: var(--text-muted);
  }

  .interp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .interp-item {
    padding: 13px 16px;
    background: #faf8f5;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
  }

  .interp-range {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .interp-desc { color: var(--text-muted); font-size: 12px; }

  .interp-item.current { border-color: var(--accent); background: #eef2f5; }
  .interp-item.current .interp-desc { color: var(--text); font-weight: 400; }

  /* Bottom buttons */
  .btn-copy {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .btn-copy:hover { background: #eef2f5; box-shadow: 0 3px 12px rgba(143,168,184,0.15); }

  .btn-restart {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 15px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .btn-restart:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface); }

  @media (max-width: 600px) {
    .header h1 { font-size: 30px; }
    .scale-legend { grid-template-columns: repeat(2, 1fr); }
    .interp-grid { grid-template-columns: 1fr; }
    .score-number { font-size: 72px; }
    .symptoms-card { padding: 20px 16px; }
    .score-btn { width: 32px; height: 32px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const symptoms = [
  "Torpe o entumecido/a",
  "Acalorado/a",
  "Con temblor en las piernas",
  "Incapaz de relajarse",
  "Con temor a que ocurra lo peor",
  "Mareado/a, o que se le va la cabeza",
  "Con latidos del corazón fuertes y acelerados",
  "Inestable",
  "Atemorizado/a o asustado/a",
  "Nervioso/a",
  "Con sensación de bloqueo",
  "Con temblores en las manos",
  "Inquieto/a, inseguro/a",
  "Con miedo a perder el control",
  "Con sensación de ahogo",
  "Con temor a morir",
  "Con miedo",
  "Con problemas digestivos",
  "Con desvanecimientos",
  "Con rubor facial",
  "Con sudores, fríos o calientes"
];

const SCALE = [
  { score: 0, label: "En absoluto" },
  { score: 1, label: "Levemente" },
  { score: 2, label: "Moderadamente" },
  { score: 3, label: "Severamente" }
];

const SEVERITY = [
  { min: 0,  max: 7,  label: "Ansiedad mínima",   cls: "severity-min" },
  { min: 8,  max: 15, label: "Ansiedad leve",      cls: "severity-leve" },
  { min: 16, max: 25, label: "Ansiedad moderada",  cls: "severity-moderate" },
  { min: 26, max: 63, label: "Ansiedad grave",      cls: "severity-severe" }
];

let answers = new Array(symptoms.length).fill(null);
let showResults = false;

function getSeverity(score) {
  return SEVERITY.find(s => score >= s.min && score <= s.max);
}

function getScoreColor(score) {
  if (score <= 7)  return '#5e8f6e';
  if (score <= 15) return '#7a8f5e';
  if (score <= 25) return '#9a7c3f';
  return '#a04545';
}

function answered() {
  return answers.filter(a => a !== null).length;
}

function render() {
  const app = document.getElementById('app');
  if (showResults) { renderResults(app); return; }

  const done = answered();
  const pct  = (done / symptoms.length) * 100;

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Evaluación psiquiátrica</div>
      <h1>Inventario de Ansiedad de <em>Beck</em></h1>
      <p class="header-desc">BAI · 21 síntomas · Indique el grado en que se ha visto afectado/a durante la última semana y en el momento actual.</p>
    </div>

    <div class="instruccion">
      <div class="instruccion-title">Instrucciones</div>
      <p>A continuación se presenta una lista de síntomas. Seleccione para cada uno el número que mejor describe cómo se ha sentido durante la <strong>última semana</strong>, incluyendo hoy.</p>
    </div>

    <div class="scale-legend">
      ${SCALE.map(s => `
        <div class="scale-leg-item">
          <div class="scale-leg-num">${s.score}</div>
          <div class="scale-leg-txt">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Completado</span>
        <span class="progress-count">${done} / ${symptoms.length}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="symptoms-card">
      ${symptoms.map((sym, i) => `
        <div class="symptom-row ${answers[i] !== null ? 'answered' : ''}">
          <div class="symptom-left">
            <span class="symptom-num">${i+1}</span>
            <span class="symptom-name">${sym}</span>
          </div>
          <div class="score-btns">
            ${SCALE.map(s => `
              <button class="score-btn ${answers[i] === s.score ? 'active' : ''}"
                      onclick="select(${i}, ${s.score})"
                      title="${s.label}">
                ${s.score}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <button class="btn-result" onclick="verResultado()" ${done < symptoms.length ? 'disabled' : ''}>
      ${done < symptoms.length ? `Faltan ${symptoms.length - done} síntomas por valorar` : 'Ver resultado →'}
    </button>
  `;
}

function renderResults(app) {
  const total    = answers.reduce((s, a) => s + (a || 0), 0);
  const severity = getSeverity(total);
  const color    = getScoreColor(total);
  const date     = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Resultado de la evaluación</div>
      <h1>Inventario de Ansiedad de <em>Beck</em></h1>
    </div>

    <div class="results">
      <div class="score-display">
        <div class="score-label">Puntuación total</div>
        <div class="score-number" style="color:${color}">${total}</div>
        <div class="score-max">de 63 puntos posibles</div>
        <span class="score-severity ${severity.cls}">${severity.label}</span>
      </div>

      <div class="breakdown-section">
        <div class="breakdown-title">Desglose por síntoma</div>
        ${symptoms.map((sym, i) => {
          const val = answers[i] || 0;
          return `
            <div class="breakdown-item">
              <div class="breakdown-name">${i+1}. ${sym}</div>
              <div class="breakdown-bar-wrap">
                <div class="breakdown-bar" style="width:${(val/3)*100}%"></div>
              </div>
              <div class="breakdown-val">${val}/3</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="interpretation">
        <h3>Interpretación de la escala</h3>
        <div class="interp-grid">
          ${SEVERITY.map(s => `
            <div class="interp-item ${total >= s.min && total <= s.max ? 'current' : ''}">
              <div class="interp-range">${s.min}–${s.max} puntos</div>
              <div class="interp-desc">${s.label}</div>
            </div>
          `).join('')}
        </div>
        <p style="margin-top:16px; color:var(--text-dim); font-size:11px; line-height:1.7;">
          Nota: El BAI es una herramienta de apoyo diagnóstico. Los resultados deben ser interpretados en el contexto clínico completo por un profesional de salud mental. Basado en Beck & Steer (1993).
        </p>
      </div>

      <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">⎘ Copiar para ficha clínica</button>
      <button class="btn-restart" onclick="restart()">↩ Nueva evaluación</button>
    </div>
  `;
}

function buildPlainText() {
  const total    = answers.reduce((s, a) => s + (a || 0), 0);
  const severity = getSeverity(total);
  const date     = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const labels   = ['En absoluto', 'Levemente', 'Moderadamente', 'Severamente'];

  const lines = [];
  lines.push('INVENTARIO DE ANSIEDAD DE BECK (BAI)');
  lines.push('Fecha de aplicacion: ' + date);
  lines.push('');
  lines.push('SINTOMAS Y PUNTAJES (0=En absoluto / 1=Levemente / 2=Moderadamente / 3=Severamente):');
  symptoms.forEach((sym, i) => {
    const val = answers[i] !== null ? answers[i] : 0;
    lines.push((i+1) + '. ' + sym + ': ' + val + ' (' + labels[val] + ')');
  });
  lines.push('');
  lines.push('PUNTAJE TOTAL: ' + total + ' / 63');
  lines.push('NIVEL DE ANSIEDAD: ' + severity.label + ' (' + severity.min + '-' + severity.max + ' puntos)');
  lines.push('');
  lines.push('Rangos de referencia:');
  lines.push('  0-7:   Ansiedad minima');
  lines.push('  8-15:  Ansiedad leve');
  lines.push('  16-25: Ansiedad moderada');
  lines.push('  26-63: Ansiedad grave');
  lines.push('');
  lines.push('Fuente: adaptacion espanola del BAI (basado en Beck y Steer, 1993)');
  return lines.join('\n');
}

async function copyToClipboard() {
  const text = buildPlainText();
  const btn  = document.getElementById('btnCopy');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copiado';
    btn.style.borderColor = 'var(--accent3)';
    btn.style.color = 'var(--accent3)';
    setTimeout(() => {
      btn.textContent = '⎘ Copiar para ficha clínica';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2500);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = '⎘ Copiar para ficha clínica'; }, 2500);
  }
}

function select(i, score) {
  answers[i] = score;
  render();
}

function verResultado() {
  if (answered() < symptoms.length) return;
  showResults = true;
  render();
}

function restart() {
  answers     = new Array(symptoms.length).fill(null);
  showResults = false;
  render();
}

render();
</script>
</body>
</html>
