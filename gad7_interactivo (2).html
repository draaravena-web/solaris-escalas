<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAD-7 — Trastorno de Ansiedad Generalizada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f3ee;
    --surface: #e8e9e1;
    --card: #ffffff;
    --border: #d8d9ce;
    --border-soft: #e4e5da;
    --accent: #9aaa7a;       /* verde musgo cálido */
    --accent2: #b89060;      /* ámbar suave */
    --accent3: #8fa8b8;      /* azul niebla */
    --text: #353530;
    --text-muted: #72706a;
    --text-dim: #aeaca4;
    --selected-bg: #f0f3ea;
    --selected-border: #9aaa7a;
    --shadow: 0 2px 16px rgba(60,65,40,0.07);
    --shadow-sm: 0 1px 6px rgba(60,65,40,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 65% 45% at 5% 10%, rgba(154,170,122,0.1) 0%, transparent 55%),
      radial-gradient(ellipse 50% 55% at 92% 85%, rgba(184,144,96,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 70% 5%, rgba(143,168,184,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  .header {
    margin-bottom: 44px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    color: var(--accent);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent2);
  }

  .header-desc {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 12px;
    max-width: 540px;
    line-height: 1.65;
  }

  /* ── Instrucción ── */
  .instruccion {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 32px;
    box-shadow: var(--shadow-sm);
  }

  .instruccion-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .instruccion p { color: var(--text-muted); font-size: 12.5px; line-height: 1.7; }

  /* ── Leyenda de escala ── */
  .scale-legend {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .scale-leg-item {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 12px 10px;
    box-shadow: var(--shadow-sm);
    text-align: center;
  }

  .scale-leg-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }

  .scale-leg-txt { font-size: 10.5px; color: var(--text-muted); line-height: 1.35; }

  /* ── Progreso ── */
  .progress-wrap { margin-bottom: 24px; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .progress-count { color: var(--accent); font-size: 11px; font-weight: 500; }

  .progress-bar { height: 3px; background: var(--border-soft); border-radius: 3px; overflow: hidden; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Tarjetas de pregunta ── */
  .questions-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 8px 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-row {
    padding: 20px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .question-row:last-child { border-bottom: none; }

  .question-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .question-num {
    min-width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.15s;
  }

  .question-row.answered .question-num {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .question-text {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.5;
    transition: color 0.15s;
    padding-top: 2px;
  }

  .question-row.answered .question-text { color: var(--text); }

  /* Opciones de respuesta */
  .options-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding-left: 40px;
  }

  .opt-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 6px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    background: #faf9f6;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Jost', sans-serif;
  }

  .opt-btn:hover {
    border-color: var(--accent);
    background: var(--selected-bg);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(154,170,122,0.15);
  }

  .opt-btn.active {
    border-color: var(--accent);
    background: var(--selected-bg);
    box-shadow: 0 3px 12px rgba(154,170,122,0.2);
  }

  .opt-score {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 400;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .opt-btn.active .opt-score {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .opt-label {
    font-size: 9.5px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.02em;
    transition: color 0.15s;
  }

  .opt-btn.active .opt-label { color: var(--accent); }

  /* ── Pregunta de impacto funcional ── */
  .funcional-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent2);
    border-radius: 0 12px 12px 0;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .funcional-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 10px;
  }

  .funcional-question {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  .funcional-opts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .func-btn {
    padding: 10px 8px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    background: #faf9f6;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.35;
  }

  .func-btn:hover { border-color: var(--accent2); background: #faf5ee; }
  .func-btn.active { border-color: var(--accent2); background: #faf5ee; color: var(--text); font-weight: 500; }

  /* ── Botón resultado ── */
  .btn-result {
    display: block;
    width: 100%;
    padding: 16px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 3px 14px rgba(154,170,122,0.3);
  }

  .btn-result:hover {
    background: #889960;
    box-shadow: 0 4px 18px rgba(154,170,122,0.4);
    transform: translateY(-1px);
  }

  .btn-result:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── Resultados ── */
  .results { animation: fadeSlide 0.4s ease; }

  .score-display {
    text-align: center;
    padding: 52px 36px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .score-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 55% at 50% 110%, rgba(154,170,122,0.09) 0%, transparent 65%);
    pointer-events: none;
  }

  .score-label {
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-max { color: var(--text-dim); font-size: 12px; margin-bottom: 22px; }

  .score-severity {
    display: inline-block;
    padding: 9px 28px;
    border-radius: 24px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid;
  }

  .severity-min      { color: #5e8f6e; border-color: #a8c9b3; background: #eef5f1; }
  .severity-leve     { color: #7a8f5e; border-color: #b8c9a3; background: #f2f5ec; }
  .severity-moderate { color: #9a7c3f; border-color: #d4b87a; background: #faf5ea; }
  .severity-severe   { color: #a04545; border-color: #cc9090; background: #faeaea; }

  /* Breakdown */
  .breakdown-section {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 26px 28px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }

  .breakdown-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 300;
    margin-bottom: 20px;
    color: var(--text-muted);
  }

  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-name { flex: 1; color: var(--text-muted); font-size: 12px; line-height: 1.4; }

  .breakdown-bar-wrap {
    width: 90px;
    height: 5px;
    background: var(--border-soft);
    border-radius: 3px;
    overflow: hidden;
  }

  .breakdown-bar {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .breakdown-val { width: 28px; text-align: right; color: var(--accent); font-size: 12px; font-weight: 500; }

  /* Interpretation */
  .interpretation {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 26px 28px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }

  .interpretation h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 16px;
    color: var(--text-muted);
  }

  .interp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .interp-item {
    padding: 13px 16px;
    background: #faf8f4;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
  }

  .interp-range { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; margin-bottom: 4px; text-transform: uppercase; }
  .interp-desc  { color: var(--text-muted); font-size: 11.5px; line-height: 1.4; }
  .interp-note  { color: var(--text-dim); font-size: 10.5px; margin-top: 4px; font-style: italic; line-height: 1.4; }

  .interp-item.current { border-color: var(--accent); background: var(--selected-bg); }
  .interp-item.current .interp-desc { color: var(--text); font-weight: 400; }

  /* Impacto funcional resultado */
  .funcional-result {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent2);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }

  .funcional-result-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .funcional-result-val { font-size: 13px; color: var(--text-muted); }

  /* Bottom buttons */
  .btn-copy {
    display: block; width: 100%; margin-top: 18px; padding: 15px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; border: 1px solid var(--accent);
    border-radius: 8px; color: var(--accent); cursor: pointer;
    transition: all 0.18s ease;
  }
  .btn-copy:hover { background: var(--selected-bg); }

  .btn-restart {
    display: block; width: 100%; margin-top: 10px; padding: 15px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted); cursor: pointer;
    transition: all 0.18s ease;
  }
  .btn-restart:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface); }

  @media (max-width: 600px) {
    .header h1 { font-size: 30px; }
    .scale-legend { grid-template-columns: repeat(2, 1fr); }
    .options-row { grid-template-columns: repeat(4, 1fr); padding-left: 0; gap: 5px; }
    .opt-btn { padding: 8px 4px; }
    .opt-score { width: 26px; height: 26px; font-size: 12px; }
    .opt-label { font-size: 8.5px; }
    .funcional-opts { grid-template-columns: repeat(2, 1fr); }
    .interp-grid { grid-template-columns: 1fr; }
    .score-number { font-size: 72px; }
    .questions-card { padding: 8px 16px 20px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const questions = [
  "Sentirse nervioso/a, ansioso/a o muy alterado/a",
  "No poder detenerse o controlar la preocupación",
  "Preocuparse demasiado por cosas diferentes",
  "Dificultad para relajarse",
  "Estar tan inquieto/a que es difícil quedarse quieto/a",
  "Molestarse o irritarse con facilidad",
  "Sentir miedo, como si algo horrible pudiera suceder"
];

const SCALE = [
  { score: 0, label: "De nada" },
  { score: 1, label: "Varios días" },
  { score: 2, label: "Más de la mitad de los días" },
  { score: 3, label: "Casi todos los días" }
];

const FUNCIONAL_OPTS = [
  "Nada difícil",
  "Algo difícil",
  "Muy difícil",
  "Extremadamente difícil"
];

const SEVERITY = [
  { min: 1,  max: 4,  label: "Ansiedad mínima",              cls: "severity-min",      note: "El tratamiento puede no estar indicado clínicamente." },
  { min: 5,  max: 9,  label: "Ansiedad leve",                cls: "severity-leve",     note: "Evaluar según conocimiento del paciente, duración y gravedad." },
  { min: 10, max: 14, label: "Ansiedad moderada",            cls: "severity-moderate", note: "Las metas terapéuticas se orientan a los síntomas específicos del paciente." },
  { min: 15, max: 21, label: "Ansiedad moderada a severa",   cls: "severity-severe",   note: "Frecuentemente indica tratamiento farmacológico, psicoterapéutico o ambos." }
];

let answers    = new Array(questions.length).fill(null);
let funcional  = null;
let showResults = false;

function getSeverity(score) {
  if (score === 0) return { min:0, max:0, label:"Sin ansiedad", cls:"severity-min", note:"Sin síntomas reportados." };
  return SEVERITY.find(s => score >= s.min && score <= s.max);
}

function getScoreColor(score) {
  if (score <= 4)  return '#5e8f6e';
  if (score <= 9)  return '#7a8f5e';
  if (score <= 14) return '#9a7c3f';
  return '#a04545';
}

function answered() { return answers.filter(a => a !== null).length; }

function render() {
  const app = document.getElementById('app');
  if (showResults) { renderResults(app); return; }

  const done = answered();
  const pct  = (done / questions.length) * 100;

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Evaluación psiquiátrica</div>
      <h1>Escala de Ansiedad Generalizada <em>GAD-7</em></h1>
      <p class="header-desc">7 ítems · Las preguntas se refieren a síntomas de ansiedad durante las <strong>últimas dos semanas</strong>. Spitzer et al., 2006.</p>
    </div>

    <div class="instruccion">
      <div class="instruccion-title">Instrucciones</div>
      <p>Durante las últimas 2 semanas, ¿con qué frecuencia le han molestado los siguientes problemas? Seleccione la opción que mejor refleje su experiencia.</p>
    </div>

    <div class="scale-legend">
      ${SCALE.map(s => `
        <div class="scale-leg-item">
          <div class="scale-leg-num">${s.score}</div>
          <div class="scale-leg-txt">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Completado</span>
        <span class="progress-count">${done} / ${questions.length}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="questions-card">
      ${questions.map((q, i) => `
        <div class="question-row ${answers[i] !== null ? 'answered' : ''}">
          <div class="question-top">
            <span class="question-num">${i+1}</span>
            <span class="question-text">${q}</span>
          </div>
          <div class="options-row">
            ${SCALE.map(s => `
              <button class="opt-btn ${answers[i] === s.score ? 'active' : ''}"
                      onclick="select(${i}, ${s.score})">
                <span class="opt-score">${s.score}</span>
                <span class="opt-label">${s.label}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="funcional-card">
      <div class="funcional-title">Impacto funcional</div>
      <div class="funcional-question">Si marcó cualquier problema, ¿qué tan difícil le han hecho estos síntomas realizar su trabajo, ocuparse de las cosas en casa o llevarse bien con otras personas?</div>
      <div class="funcional-opts">
        ${FUNCIONAL_OPTS.map((opt, i) => `
          <button class="func-btn ${funcional === i ? 'active' : ''}"
                  onclick="selectFuncional(${i})">
            ${opt}
          </button>
        `).join('')}
      </div>
    </div>

    <button class="btn-result" onclick="verResultado()" ${done < questions.length ? 'disabled' : ''}>
      ${done < questions.length ? `Faltan ${questions.length - done} preguntas` : 'Ver resultado →'}
    </button>
  `;
}

function renderResults(app) {
  const total    = answers.reduce((s, a) => s + (a || 0), 0);
  const severity = getSeverity(total);
  const color    = getScoreColor(total);

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Resultado de la evaluación</div>
      <h1>Escala de Ansiedad Generalizada <em>GAD-7</em></h1>
    </div>

    <div class="results">
      <div class="score-display">
        <div class="score-label">Puntuación total</div>
        <div class="score-number" style="color:${color}">${total}</div>
        <div class="score-max">de 21 puntos posibles</div>
        <span class="score-severity ${severity.cls}">${severity.label}</span>
      </div>

      <div class="breakdown-section">
        <div class="breakdown-title">Desglose por ítem</div>
        ${questions.map((q, i) => {
          const val = answers[i] || 0;
          return `
            <div class="breakdown-item">
              <div class="breakdown-name">${i+1}. ${q}</div>
              <div class="breakdown-bar-wrap">
                <div class="breakdown-bar" style="width:${(val/3)*100}%"></div>
              </div>
              <div class="breakdown-val">${val}/3</div>
            </div>
          `;
        }).join('')}
      </div>

      ${funcional !== null ? `
        <div class="funcional-result">
          <div class="funcional-result-label">Impacto funcional reportado</div>
          <div class="funcional-result-val">${FUNCIONAL_OPTS[funcional]}</div>
        </div>
      ` : ''}

      <div class="interpretation">
        <h3>Interpretación de la escala</h3>
        <div class="interp-grid">
          ${SEVERITY.map(s => `
            <div class="interp-item ${total >= s.min && total <= s.max ? 'current' : ''}">
              <div class="interp-range">${s.min}–${s.max} puntos</div>
              <div class="interp-desc">${s.label}</div>
              <div class="interp-note">${s.note}</div>
            </div>
          `).join('')}
        </div>
        <p style="margin-top:16px; color:var(--text-dim); font-size:11px; line-height:1.7;">
          Nota: El GAD-7 es una herramienta de cribado validada. El diagnóstico debe realizarse por un profesional de salud mental. Ref: Spitzer RL et al., Arch Intern Med. 2006;166(10):1092-1097.
        </p>
      </div>

      <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">⎘ Copiar para ficha clínica</button>
      <button class="btn-restart" onclick="restart()">↩ Nueva evaluación</button>
    </div>
  `;
}

function buildPlainText() {
  const total    = answers.reduce((s, a) => s + (a || 0), 0);
  const severity = getSeverity(total);
  const date     = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const labels   = ['De nada (0)', 'Varios dias (1)', 'Mas de la mitad de los dias (2)', 'Casi todos los dias (3)'];

  const lines = [];
  lines.push('ESCALA GAD-7 (Generalized Anxiety Disorder 7-item Scale)');
  lines.push('Fecha de aplicacion: ' + date);
  lines.push('Periodo de referencia: ultimas 2 semanas');
  lines.push('');
  lines.push('ITEMS Y PUNTAJES:');
  questions.forEach((q, i) => {
    const val = answers[i] !== null ? answers[i] : 0;
    lines.push((i+1) + '. ' + q + ': ' + val + ' - ' + labels[val]);
  });
  lines.push('');
  if (funcional !== null) {
    lines.push('IMPACTO FUNCIONAL: ' + FUNCIONAL_OPTS[funcional]);
    lines.push('');
  }
  lines.push('PUNTAJE TOTAL: ' + total + ' / 21');
  lines.push('NIVEL DE ANSIEDAD: ' + severity.label + ' (' + severity.min + '-' + severity.max + ' puntos)');
  lines.push('Orientacion clinica: ' + severity.note);
  lines.push('');
  lines.push('Rangos de referencia:');
  lines.push('  1-4:   Ansiedad minima');
  lines.push('  5-9:   Ansiedad leve');
  lines.push('  10-14: Ansiedad moderada');
  lines.push('  15-21: Ansiedad moderada a severa');
  lines.push('');
  lines.push('Fuente: Spitzer RL et al. Arch Intern Med. 2006;166(10):1092-1097.');
  return lines.join('\n');
}

async function copyToClipboard() {
  const text = buildPlainText();
  const btn  = document.getElementById('btnCopy');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copiado';
    btn.style.borderColor = '#7a9e87';
    btn.style.color = '#7a9e87';
    setTimeout(() => {
      btn.textContent = '⎘ Copiar para ficha clínica';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2500);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = '⎘ Copiar para ficha clínica'; }, 2500);
  }
}

function select(i, score) { answers[i] = score; render(); }
function selectFuncional(i) { funcional = i; render(); }
function verResultado() { if (answered() < questions.length) return; showResults = true; render(); }
function restart() { answers = new Array(questions.length).fill(null); funcional = null; showResults = false; render(); }

render();
</script>
</body>
</html>
