<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQ-10 — Cociente de Espectro Autista</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eeedf5;
    --surface: #e4e2ef;
    --card: #ffffff;
    --border: #d4d2e3;
    --border-soft: #dfdde9;
    --accent: #8878b0;      /* lavanda-violeta — única para AQ-10 */
    --accent2: #b09878;     /* ocre cálido */
    --text: #2e2c3a;
    --text-muted: #6e6a7c;
    --text-dim: #aea8bc;
    --selected-bg: #f0eef8;
    --selected-border: #8878b0;
    --shadow: 0 2px 16px rgba(50,40,80,0.07);
    --shadow-sm: 0 1px 6px rgba(50,40,80,0.05);
    --green: #6a9e7a;
    --orange: #c49060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 45% at 8% 12%, rgba(136,120,176,0.09) 0%, transparent 55%),
      radial-gradient(ellipse 50% 55% at 90% 85%, rgba(176,152,120,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 35% 40% at 70% 5%,  rgba(106,158,122,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  .header {
    margin-bottom: 44px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    color: var(--accent);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
  }

  .header h1 em { font-style: italic; color: var(--accent); }

  .header-desc {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 12px;
    max-width: 560px;
    line-height: 1.65;
  }

  /* ── Instrucción ── */
  .instruccion {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }

  .instruccion-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .instruccion p { color: var(--text-muted); font-size: 12.5px; line-height: 1.7; }

  /* ── Leyenda de opciones ── */
  .scale-legend {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .scale-leg-item {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 12px 10px;
    box-shadow: var(--shadow-sm);
    text-align: center;
  }

  .scale-leg-icon { font-size: 18px; margin-bottom: 5px; line-height: 1; }
  .scale-leg-txt  { font-size: 10.5px; color: var(--text-muted); line-height: 1.35; }

  /* ── Progreso ── */
  .progress-wrap { margin-bottom: 24px; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label { color: var(--text-dim); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .progress-count { color: var(--accent); font-size: 11px; font-weight: 500; }
  .progress-bar   { height: 3px; background: var(--border-soft); border-radius: 3px; overflow: hidden; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Tarjetas de pregunta ── */
  .questions-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .question-card.answered {
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
  }

  .question-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .question-num {
    min-width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.15s;
  }

  .question-card.answered .question-num {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .question-text {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.5;
    padding-top: 2px;
    transition: color 0.15s;
  }

  .question-card.answered .question-text { color: var(--text); }

  /* Opciones de respuesta */
  .options-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    padding-left: 40px;
  }

  .opt-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 6px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    background: #faf9fc;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Jost', sans-serif;
  }

  .opt-btn:hover {
    border-color: var(--accent);
    background: var(--selected-bg);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(136,120,176,0.15);
  }

  .opt-btn.active {
    border-color: var(--accent);
    background: var(--selected-bg);
    box-shadow: 0 3px 12px rgba(136,120,176,0.2);
  }

  .opt-icon {
    font-size: 16px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .opt-label {
    font-size: 9.5px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.3;
    transition: color 0.15s;
  }

  .opt-btn.active .opt-label { color: var(--accent); }

  /* Puntos badge en tarjeta */
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    margin-left: 40px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    border: 1px solid;
    transition: all 0.2s;
  }

  .badge-point   { color: var(--accent); border-color: rgba(136,120,176,0.3); background: rgba(136,120,176,0.07); }
  .badge-nopoint { color: var(--text-dim); border-color: var(--border-soft); background: transparent; }

  /* ── Botón resultado ── */
  .btn-result {
    display: block;
    width: 100%;
    padding: 16px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 3px 14px rgba(136,120,176,0.3);
  }

  .btn-result:hover {
    background: #7868a0;
    box-shadow: 0 4px 18px rgba(136,120,176,0.4);
    transform: translateY(-1px);
  }

  .btn-result:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── Resultados ── */
  .results { animation: fadeSlide 0.4s ease; }

  .score-display {
    text-align: center;
    padding: 52px 36px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .score-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 55% at 50% 110%, rgba(136,120,176,0.09) 0%, transparent 65%);
    pointer-events: none;
  }

  .score-label {
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-max { color: var(--text-dim); font-size: 12px; margin-bottom: 22px; }

  .score-severity {
    display: inline-block;
    padding: 9px 28px;
    border-radius: 24px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid;
  }

  .result-ok    { color: #5e8f6e; border-color: #a8c9b3; background: #eef5f1; }
  .result-refer { color: #8878b0; border-color: #bbaee0; background: #f3f0fa; }

  /* Indicador de derivación */
  .referral-box {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .referral-box.refer {
    border-color: #bbaee0;
    background: #f8f6fd;
  }

  .referral-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 300;
    margin-bottom: 12px;
    color: var(--text-muted);
  }

  .referral-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .referral-text strong { color: var(--text); font-weight: 500; }

  /* Breakdown */
  .breakdown-section {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 26px 28px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }

  .breakdown-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 300;
    margin-bottom: 20px;
    color: var(--text-muted);
  }

  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .breakdown-item:last-child { border-bottom: none; }

  .breakdown-name { flex: 1; color: var(--text-muted); font-size: 12px; line-height: 1.4; }

  .breakdown-answer {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    min-width: 120px;
  }

  .breakdown-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-point   { background: var(--accent); }
  .dot-nopoint { background: var(--border); }

  .breakdown-val {
    width: 28px;
    text-align: right;
    font-size: 13px;
    font-weight: 500;
  }

  .val-point   { color: var(--accent); }
  val-nopoint  { color: var(--text-dim); }

  /* Interpretation */
  .interpretation {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 26px 28px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }

  .interpretation h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 16px;
    color: var(--text-muted);
  }

  .interp-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .interp-item {
    padding: 16px 18px;
    background: #faf9fc;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
  }

  .interp-range { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; margin-bottom: 5px; text-transform: uppercase; }
  .interp-desc  { color: var(--text-muted); font-size: 12.5px; margin-bottom: 5px; }
  .interp-note  { color: var(--text-dim); font-size: 10.5px; font-style: italic; line-height: 1.4; }

  .interp-item.current { border-color: var(--accent); background: var(--selected-bg); }
  .interp-item.current .interp-desc { color: var(--text); font-weight: 400; }

  /* Bottom buttons */
  .btn-copy {
    display: block; width: 100%; margin-top: 18px; padding: 15px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; border: 1px solid var(--accent);
    border-radius: 8px; color: var(--accent); cursor: pointer;
    transition: all 0.18s ease;
  }
  .btn-copy:hover { background: var(--selected-bg); }

  .btn-restart {
    display: block; width: 100%; margin-top: 10px; padding: 15px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted); cursor: pointer;
    transition: all 0.18s ease;
  }
  .btn-restart:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface); }

  @media (max-width: 600px) {
    .header h1 { font-size: 28px; }
    .scale-legend { grid-template-columns: repeat(2, 1fr); }
    .options-row { padding-left: 0; gap: 5px; }
    .opt-icon { font-size: 14px; }
    .opt-label { font-size: 8.5px; }
    .score-number { font-size: 72px; }
    .interp-row { grid-template-columns: 1fr; }
    .breakdown-answer { min-width: 80px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// puntua:true  → puntúa si responde "de acuerdo" (def o lig)
// puntua:false → puntúa si responde "en desacuerdo" (def o lig)
const questions = [
  { text: "Con frecuencia percibo pequeños sonidos cuando los demás no lo hacen.",            puntua: true  },
  { text: "Usualmente me concentro en toda la imagen en lugar de pequeños detalles.",         puntua: false },
  { text: "Se me facilita hacer más de una cosa a la vez.",                                   puntua: false },
  { text: "Si hay una interrupción, puedo volver inmediatamente a donde estaba.",             puntua: false },
  { text: "Se me facilita \"leer entre líneas\" cuando alguien me habla.",                    puntua: false },
  { text: "Puedo darme cuenta cuando alguien me está escuchando o cuando se está aburriendo.",puntua: false },
  { text: "Cuando estoy leyendo una historia, se me dificulta identificar las intenciones de los personajes.", puntua: true },
  { text: "Me gusta coleccionar información acerca de categorías de cosas (ej: tipos de autos, aves, trenes, plantas, etc.).", puntua: true },
  { text: "Se me facilita saber lo que alguien está pensando o sintiendo simplemente mirándole a la cara.", puntua: false },
  { text: "Se me dificulta distinguir las intenciones de la gente.",                          puntua: true  }
];

// Opciones: 0=Def acuerdo, 1=Lig acuerdo, 2=Lig desacuerdo, 3=Def desacuerdo
const OPTIONS = [
  { value: 0, label: "Definitivamente de acuerdo",   icon: "●●" },
  { value: 1, label: "Ligeramente de acuerdo",        icon: "●○" },
  { value: 2, label: "Ligeramente en desacuerdo",     icon: "○●" },
  { value: 3, label: "Definitivamente en desacuerdo", icon: "○○" }
];

// Calcula si una respuesta suma punto
function givesPoint(qIndex, optValue) {
  const q = questions[qIndex];
  if (q.puntua) {
    return optValue === 0 || optValue === 1; // acuerdo
  } else {
    return optValue === 2 || optValue === 3; // desacuerdo
  }
}

let answers     = new Array(questions.length).fill(null);
let showResults = false;

function answered() { return answers.filter(a => a !== null).length; }

function totalScore() {
  return answers.reduce((sum, a, i) => {
    if (a === null) return sum;
    return sum + (givesPoint(i, a) ? 1 : 0);
  }, 0);
}

function render() {
  const app = document.getElementById('app');
  if (showResults) { renderResults(app); return; }

  const done = answered();
  const pct  = (done / questions.length) * 100;

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Evaluación · Cribado</div>
      <h1>Cociente de Espectro <em>Autista AQ-10</em></h1>
      <p class="header-desc">10 ítems · Instrumento de cribado rápido para adultos con sospecha de autismo sin dificultades de aprendizaje. Allison, Auyeung & Baron-Cohen, 2012. Universidad de Cambridge.</p>
    </div>

    <div class="instruccion">
      <div class="instruccion-title">Instrucciones</div>
      <p>Marque únicamente una opción por pregunta. No existen respuestas correctas ni incorrectas. Responda según lo que mejor describe su experiencia habitual, no cómo le gustaría ser.</p>
    </div>

    <div class="scale-legend">
      ${OPTIONS.map(o => `
        <div class="scale-leg-item">
          <div class="scale-leg-icon">${o.icon}</div>
          <div class="scale-leg-txt">${o.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Completado</span>
        <span class="progress-count">${done} / ${questions.length}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="questions-wrap">
      ${questions.map((q, i) => {
        const sel = answers[i];
        const pts = sel !== null ? givesPoint(i, sel) : null;
        return `
          <div class="question-card ${sel !== null ? 'answered' : ''}">
            <div class="question-top">
              <span class="question-num">${i+1}</span>
              <span class="question-text">${q.text}</span>
            </div>
            <div class="options-row">
              ${OPTIONS.map(o => `
                <button class="opt-btn ${sel === o.value ? 'active' : ''}"
                        onclick="select(${i}, ${o.value})">
                  <span class="opt-icon">${o.icon}</span>
                  <span class="opt-label">${o.label}</span>
                </button>
              `).join('')}
            </div>
            ${sel !== null ? `
              <div class="score-badge ${pts ? 'badge-point' : 'badge-nopoint'}">
                ${pts ? '▲ Suma 1 punto' : '— No suma punto'}
              </div>
            ` : ''}
          </div>
        `;
      }).join('')}
    </div>

    <button class="btn-result" onclick="verResultado()" ${done < questions.length ? 'disabled' : ''}>
      ${done < questions.length ? `Faltan ${questions.length - done} preguntas` : 'Ver resultado →'}
    </button>
  `;
}

function renderResults(app) {
  const score   = totalScore();
  const refer   = score >= 6;
  const date    = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });

  app.innerHTML = `
    <div class="header">
      <div class="header-label">Resultado del cribado</div>
      <h1>Cociente de Espectro <em>Autista AQ-10</em></h1>
    </div>

    <div class="results">

      <div class="score-display">
        <div class="score-label">Puntuación total</div>
        <div class="score-number" style="color:${refer ? '#7858b0' : '#5e8f6e'}">${score}</div>
        <div class="score-max">de 10 puntos posibles</div>
        <span class="score-severity ${refer ? 'result-refer' : 'result-ok'}">
          ${refer ? 'Derivación recomendada' : 'Sin indicación de derivación'}
        </span>
      </div>

      <div class="referral-box ${refer ? 'refer' : ''}">
        <div class="referral-title">${refer ? 'Indicación clínica' : 'Resultado dentro del rango esperado'}</div>
        <div class="referral-text">
          ${refer
            ? `Con una puntuación de <strong>${score}/10</strong>, el instrumento indica que se recomienda <strong>derivar al paciente a evaluación diagnóstica especializada</strong> para trastorno del espectro autista (TEA). El AQ-10 es un instrumento de cribado, no diagnóstico. La confirmación requiere una evaluación clínica completa por un especialista (NICE clinical guideline CG142).`
            : `Con una puntuación de <strong>${score}/10</strong>, el resultado no supera el umbral de derivación (≥ 6 puntos). No se identifica indicación de derivación para diagnóstico de TEA en este momento. Si persisten preocupaciones clínicas, considerar reevaluación o valoración adicional.`
          }
        </div>
      </div>

      <div class="breakdown-section">
        <div class="breakdown-title">Desglose por ítem</div>
        ${questions.map((q, i) => {
          const sel = answers[i];
          const pts = sel !== null ? givesPoint(i, sel) : false;
          const optLabel = sel !== null ? OPTIONS[sel].label : '—';
          return `
            <div class="breakdown-item">
              <div class="breakdown-dot ${pts ? 'dot-point' : 'dot-nopoint'}"></div>
              <div class="breakdown-name">${i+1}. ${q.text}</div>
              <div class="breakdown-answer">${optLabel}</div>
              <div class="breakdown-val ${pts ? 'val-point' : ''}" style="color:${pts ? 'var(--accent)' : 'var(--text-dim)'}">
                ${pts ? '+1' : '0'}
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="interpretation">
        <h3>Interpretación del instrumento</h3>
        <div class="interp-row">
          <div class="interp-item ${!refer ? 'current' : ''}">
            <div class="interp-range">0 – 5 puntos</div>
            <div class="interp-desc">Sin indicación de derivación</div>
            <div class="interp-note">No se recomienda derivación a diagnóstico especializado en este momento.</div>
          </div>
          <div class="interp-item ${refer ? 'current' : ''}">
            <div class="interp-range">6 – 10 puntos</div>
            <div class="interp-desc">Derivación recomendada</div>
            <div class="interp-note">Se recomienda derivar a diagnóstico especializado de TEA (NICE CG142).</div>
          </div>
        </div>
        <p style="margin-top:16px; color:var(--text-dim); font-size:11px; line-height:1.7;">
          Nota: El AQ-10 es un instrumento de <strong>cribado rápido</strong>, no diagnóstico. Una puntuación elevada indica la necesidad de evaluación clínica especializada, pero no confirma diagnóstico de TEA. Ref: Allison C, Auyeung B, Baron-Cohen S. J Am Acad Child Adolesc Psychiatry. 2012;51(2):202-12.
        </p>
      </div>

      <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">⎘ Copiar para ficha clínica</button>
      <button class="btn-restart" onclick="restart()">↩ Nueva evaluación</button>
    </div>
  `;
}

function buildPlainText() {
  const score = totalScore();
  const refer = score >= 6;
  const date  = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const optLabels = ['Definitivamente de acuerdo', 'Ligeramente de acuerdo', 'Ligeramente en desacuerdo', 'Definitivamente en desacuerdo'];

  const lines = [];
  lines.push('AQ-10 — COCIENTE DE ESPECTRO AUTISTA');
  lines.push('Fecha de aplicacion: ' + date);
  lines.push('Poblacion: Adultos sin dificultades de aprendizaje');
  lines.push('');
  lines.push('RESPUESTAS Y PUNTUACION:');
  lines.push('(Suman punto: acuerdo en items 1,7,8,10 / desacuerdo en items 2,3,4,5,6,9)');
  lines.push('');
  questions.forEach((q, i) => {
    const sel = answers[i];
    const pts = sel !== null ? givesPoint(i, sel) : false;
    const resp = sel !== null ? optLabels[sel] : 'Sin respuesta';
    lines.push((i+1) + '. ' + q.text);
    lines.push('   Respuesta: ' + resp + (pts ? '  [+1 punto]' : '  [0 puntos]'));
  });
  lines.push('');
  lines.push('PUNTUACION TOTAL: ' + score + ' / 10');
  lines.push('RESULTADO: ' + (refer ? 'DERIVACION RECOMENDADA (puntuacion >= 6)' : 'Sin indicacion de derivacion (puntuacion < 6)'));
  lines.push('');
  lines.push(refer
    ? 'Se recomienda derivar a evaluacion diagnostica especializada para TEA (NICE CG142).'
    : 'No se identifica indicacion de derivacion para diagnostico de TEA en este momento.');
  lines.push('');
  lines.push('Referencia: Allison C, Auyeung B, Baron-Cohen S. J Am Acad Child Adolesc Psychiatry. 2012;51(2):202-12.');
  lines.push('Universidad de Cambridge, Autism Research Centre.');
  return lines.join('\n');
}

async function copyToClipboard() {
  const text = buildPlainText();
  const btn  = document.getElementById('btnCopy');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copiado';
    btn.style.borderColor = '#6a9e7a';
    btn.style.color = '#6a9e7a';
    setTimeout(() => {
      btn.textContent = '⎘ Copiar para ficha clínica';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2500);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = '⎘ Copiar para ficha clínica'; }, 2500);
  }
}

function select(i, opt) { answers[i] = opt; render(); }
function verResultado()  { if (answered() < questions.length) return; showResults = true; render(); }
function restart()       { answers = new Array(questions.length).fill(null); showResults = false; render(); }

render();
</script>
</body>
</html>
